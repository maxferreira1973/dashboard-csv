<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Vendas - CSV</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js viaa CDN (antes do script.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <header>
    <h1>Dashboard de Vendas</h1>
  </header>


  <!-- Controles agrupados -->
  <div class="controls-wrapper">
    <!-- Exportar -->
    <section class="controls">
      <button id="exportPdfBtn" class="btn">Exportar PDF</button>
    </section>

    <!-- Filtros com date pickers nativos (já funcionam!) -->
    <section class="filters">
      <div class="filter-group">
        <label for="startDate">Data inicial:</label>
        <input type="date" id="startDate" value="2024-01-01" min="2024-01-01" max="2024-12-31" />
      </div>
      <div class="filter-group">
        <label for="endDate">Data final:</label>
        <input type="date" id="endDate" value="2024-12-31" min="2024-01-01" max="2024-12-31" />
      </div>
      <div class="filter-group">
        <label for="productFilter">Produto:</label>
        <select id="productFilter">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="regionFilter">Região:</label>
        <select id="regionFilter">
          <option value="">Todas</option>
        </select>
      </div>
      <button id="applyFilters">Aplicar filtros</button>
    </section>
  </div>

  <section class="kpis">
    <div class="kpi-card">
      <h3>Receita Total</h3>
      <p id="totalRevenue">-</p>
    </div>
    <div class="kpi-card">
      <h3>Lucro Total</h3>
      <p id="totalProfit">-</p>
    </div>
    <div class="kpi-card">
      <h3>Margem Média</h3>
      <p id="avgMargin">-</p>
    </div>
  </section>

  <section class="charts">
    <div class="chart-container">
      <h2>Receita por mês</h2>
      <canvas id="revenueByDateChart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Receita por produto</h2>
      <canvas id="revenueByProductChart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Receita por região</h2>
      <canvas id="revenueByRegionChart"></canvas>
    </div>
  </section>

  <section class="table-section">
    <h2>Detalhamento de vendas</h2>
    <table id="salesTable">
      <thead>
        <tr>
          <th>Data</th>
          <th>Produto</th>
          <th>Região</th>
          <th>Unidades</th>
          <th>Receita</th>
          <th>Custo</th>
          <th>Lucro</th>
          <th>Margem (%)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Script único no final -->
  <script src="script.js"></script>
</body>

</html>
