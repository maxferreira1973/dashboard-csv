<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard de Vendas - CSV</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js via CDN (precisa vir ANTES do script.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Seu script -->
  <script src="script.js"></script>
</head>

<body>
  <header>
    <h1>Dashboard de Vendas</h1>

  </header>

  <!-- NOVA DIV QUE AGRUPA TODOS OS CONTROLES -->
  <div class="controls-wrapper">
    <!-- Controles de arquivo e botão de exportar -->
    <section class="controls">
      

      <!-- Botão de exportar PDF agora fica junto dos controles -->
      <button id="exportPdfBtn" class="btn">Exportar PDF</button>
    </section>

    <!-- Filtros -->
    <section class="filters">
      <div class="filter-group">
        <label for="startDate">Data inicial:</label>
        <input type="date" id="startDate" />
      </div>
      <div class="filter-group">
        <label for="endDate">Data final:</label>
        <input type="date" id="endDate" />
      </div>
      <div class="filter-group">
        <label for="productFilter">Produto:</label>
        <select id="productFilter">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="regionFilter">Região:</label>
        <select id="regionFilter">
          <option value="">Todas</option>
        </select>
      </div>
      <button id="applyFilters">Aplicar filtros</button>
    </section>
  </div>
  <!-- FIM DA DIV controls-wrapper -->

  <section class="kpis">
    <div class="kpi-card">
      <h3>Receita Total</h3>
      <p id="totalRevenue">-</p>
    </div>
    <div class="kpi-card">
      <h3>Lucro Total</h3>
      <p id="totalProfit">-</p>
    </div>
    <div class="kpi-card">
      <h3>Margem Média</h3>
      <p id="avgMargin">-</p>
    </div>
  </section>

  <section class="charts">
    <div class="chart-container">
      <h2>Receita por mês</h2>
      <canvas id="revenueByDateChart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Receita por produto</h2>
      <canvas id="revenueByProductChart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Receita por região</h2>
      <canvas id="revenueByRegionChart"></canvas>
    </div>
  </section>

  <section class="table-section">
    <h2>Detalhamento de vendas</h2>
    <table id="salesTable">
      <thead>
        <tr>
          <th>Data</th>
          <th>Produto</th>
          <th>Região</th>
          <th>Unidades</th>
          <th>Receita</th>
          <th>Custo</th>
          <th>Lucro</th>
          <th>Margem (%)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="script.js"></script>
<!-- Insights Acionáveis -->
<div id="insights-section" class="mt-8 p-6 bg-gradient-to-r from-emerald-50 to-teal-50 rounded-2xl border-4 border-emerald-200 shadow-xl">
  <h3 class="text-2xl font-bold text-emerald-900 mb-6 flex items-center">
    <span class="text-3xl mr-3">💡</span> Insights Acionáveis
  </h3>
  <div id="insights-list" class="grid md:grid-cols-2 gap-4 text-sm leading-relaxed"></div>
</div>


</body>
</html>
